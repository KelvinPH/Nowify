<!-- End-of-stream statistics dashboard page -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nowify Stream Stats</title>
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/config.css" />
  <link rel="stylesheet" href="src/styles/stats.css" />
  <style>
    body { background: #0a0a0a; }
  </style>
</head>
<body>
  <div id="stats-shell">
    <header id="stats-header">
      <a href="config.html" class="stats-back-link" title="Open configurator">Configurator</a>
      <img class="cfg-logo stats-logo" src="assets/logo/logo.png" alt="Nowify" />
      <div class="stats-header-text">
        <span class="stats-title">Stream stats</span>
        <span class="stats-subtitle">Session recap from your overlay</span>
      </div>
      <div class="cfg-header-actions">
        <button type="button" id="btn-export" class="cfg-btn">Export JSON</button>
        <button type="button" id="btn-clear" class="cfg-btn">Clear session</button>
      </div>
    </header>

    <main id="stats-app" class="stats-main">
      <div class="stats-content">
        <section id="stats-summary" class="stats-summary stats-surface" aria-label="Summary"></section>

        <section id="stats-bangers" class="stats-block stats-surface">
          <h2 class="stats-block-title">Banger moments</h2>
          <div class="stats-block-body" id="stats-bangers-body"></div>
        </section>

        <section id="stats-mood" class="stats-block stats-surface">
          <h2 class="stats-block-title">Mood map</h2>
          <p class="stats-block-desc">Energy and valence per track (Spotify audio features).</p>
          <div class="stats-chart-wrap">
            <canvas id="mood-chart" aria-label="Mood scatter chart"></canvas>
          </div>
        </section>

        <section id="stats-top" class="stats-block stats-surface">
          <h2 class="stats-block-title">Top tracks</h2>
          <div class="stats-block-body" id="stats-top-body"></div>
        </section>
      </div>
    </main>
  </div>
  <a
    class="nowify-attribution"
    href="https://github.com/KelvinPH/Nowify"
    target="_blank"
    rel="noopener noreferrer"
  >
    Built by KelvinPH • github.com/KelvinPH/Nowify
  </a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script type="module">
    import "./src/attribution.js";
    import { init } from "./src/stats/dashboard.js";
    init();
  </script>
</body>
</html>
