<!-- Visual configurator page for overlay customization -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nowify Configurator</title>
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/config.css" />
  <link rel="stylesheet" href="src/styles/custom-editor.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
  <div id="cfg-shell">
    <header id="cfg-header">
      <div class="cfg-header-brand">
        <img class="cfg-logo" src="assets/logo/logo.png" alt="Nowify" />
        <span class="cfg-header-product">Configurator</span>
      </div>
      <nav class="cfg-header-nav" aria-label="Configurator actions">
        <div class="cfg-nav-actions">
          <button type="button" id="btn-copy" class="cfg-nav-btn cfg-nav-btn--accent">Copy URL</button>
          <button type="button" id="btn-obs-guide" class="cfg-nav-btn">Add to OBS</button>
          <span class="cfg-nav-sep" aria-hidden="true"></span>
          <div id="cfg-header-dynamic" class="cfg-nav-dynamic"></div>
          <span class="cfg-nav-sep" aria-hidden="true"></span>
          <a href="stats.html" class="cfg-nav-btn cfg-nav-btn--link">Stats</a>
          <button type="button" id="btn-open" class="cfg-nav-btn">Preview</button>
          <button type="button" id="btn-reset" class="cfg-nav-btn cfg-nav-btn--danger">Reset</button>
        </div>
      </nav>
    </header>

    <div id="cfg-body">
      <aside id="cfg-sidebar"></aside>

      <main id="cfg-preview">
        <div id="cfg-preview-primary" class="cfg-preview-primary">
          <div id="cfg-preview-frame-wrap">
            <iframe id="cfg-iframe" src="./overlay.html" frameborder="0" title="Overlay preview"></iframe>
          </div>
        </div>
        <section id="cfg-obs-minimap" class="cfg-obs-minimap" aria-label="OBS canvas placement">
          <div class="cfg-obs-minimap-head">
            <span class="cfg-obs-minimap-title">Canvas placement</span>
            <div id="cfg-obs-canvas-toolbar" class="cfg-obs-canvas-toolbar">
              <div class="cfg-obs-canvas-presets">
                <button type="button" class="cfg-btn cfg-sm-btn cfg-active" data-canvas-preset="1080p">1920×1080</button>
                <button type="button" class="cfg-btn cfg-sm-btn" data-canvas-preset="720p">1280×720</button>
                <button type="button" class="cfg-btn cfg-sm-btn" data-canvas-preset="custom">Custom</button>
              </div>
              <div id="cfg-obs-canvas-custom" class="cfg-obs-canvas-custom" hidden>
                <input id="cfg-obs-canvas-w" class="cfg-input cfg-obs-canvas-input" type="number" min="320" max="7680" value="1920" aria-label="Canvas width" />
                <span class="cfg-obs-canvas-times">×</span>
                <input id="cfg-obs-canvas-h" class="cfg-input cfg-obs-canvas-input" type="number" min="180" max="4320" value="1080" aria-label="Canvas height" />
              </div>
            </div>
            <span id="cfg-obs-size-label" class="cfg-obs-size-label"></span>
          </div>
          <div id="cfg-obs-minimap-scaler" class="cfg-obs-minimap-scaler">
            <div id="cfg-obs-canvas" class="cfg-obs-canvas">
              <span class="cfg-obs-canvas-tag">1920×1080</span>
              <div id="cfg-obs-overlay-block" class="cfg-obs-overlay-block" tabindex="0" role="img" aria-label="Overlay footprint on stream canvas"></div>
            </div>
          </div>
        </section>
        <p id="cfg-obs-workflow-hint" class="cfg-obs-workflow-hint">
          Copy URL and paste into an OBS Browser Source at the size shown in the canvas placement minimap.
        </p>
        <div id="cfg-preview-bar">
          <span id="cfg-url-display"></span>
        </div>
      </main>
    </div>
  </div>
  <a
    class="nowify-attribution"
    href="https://github.com/KelvinPH/Nowify"
    target="_blank"
    rel="noopener noreferrer"
  >
    Built by KelvinPH • github.com/KelvinPH/Nowify
  </a>

  <script type="module">
    import "./src/attribution.js";
    import { initConfig } from "./src/config/controls.js";
    initConfig();
  </script>
</body>
</html>
