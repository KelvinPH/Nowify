<!-- Visual configurator page for overlay customization -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nowify Configurator</title>
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/config.css" />
  <link rel="stylesheet" href="src/styles/custom-editor.css" />
  <style>
    body { background: #0a0a0a; }
  </style>
</head>
<body>
  <div id="cfg-shell">
    <header id="cfg-header">
      <img class="cfg-logo" src="assets/logo/logo.png" alt="Nowify" />
      <nav class="cfg-header-nav" aria-label="Configurator actions">
        <div class="cfg-nav-chunk cfg-nav-primary">
          <button type="button" id="btn-copy" class="cfg-btn cfg-btn-primary">Copy URL</button>
          <button type="button" id="btn-obs-guide" class="cfg-btn cfg-btn-secondary">Add to OBS</button>
        </div>
        <div class="cfg-nav-divider" aria-hidden="true"></div>
        <div id="cfg-header-dynamic" class="cfg-nav-chunk cfg-nav-dynamic"></div>
        <div class="cfg-nav-divider" aria-hidden="true"></div>
        <div class="cfg-nav-chunk cfg-nav-secondary">
          <a href="stats.html" class="cfg-btn cfg-btn-link cfg-btn-ghost">Stats</a>
          <button type="button" id="btn-open" class="cfg-btn cfg-btn-ghost">Preview</button>
          <button type="button" id="btn-reset" class="cfg-btn cfg-btn-ghost cfg-btn-danger-ghost">Reset</button>
        </div>
      </nav>
    </header>

    <div id="cfg-body">
      <aside id="cfg-sidebar"></aside>

      <main id="cfg-preview">
        <div id="cfg-preview-frame-wrap">
          <iframe id="cfg-iframe" src="./overlay.html" frameborder="0"></iframe>
        </div>
        <div id="cfg-preview-bar">
          <span id="cfg-url-display"></span>
        </div>
      </main>
    </div>
  </div>
  <a
    class="nowify-attribution"
    href="https://github.com/KelvinPH/Nowify"
    target="_blank"
    rel="noopener noreferrer"
  >
    Built by KelvinPH • github.com/KelvinPH/Nowify
  </a>

  <script type="module">
    import "./src/attribution.js";
    import { initConfig } from "./src/config/controls.js";
    initConfig();
  </script>
</body>
</html>
