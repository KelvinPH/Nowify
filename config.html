<!-- Visual configurator page for overlay customization -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nowify Configurator</title>
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/config.css" />
  <link rel="stylesheet" href="src/styles/custom-editor.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
  <div id="cfg-shell">
    <header id="cfg-header">
      <div class="cfg-header-brand">
        <span class="cfg-waveform-mark" aria-hidden="true">
          <svg viewBox="0 0 20 16" width="20" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="9" width="3" height="6" rx="1" fill="currentColor"/>
            <rect x="6" y="5" width="3" height="10" rx="1" fill="currentColor"/>
            <rect x="11" y="7" width="3" height="8" rx="1" fill="currentColor"/>
            <rect x="16" y="2" width="3" height="13" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <img class="cfg-logo" src="assets/logo/logo.png" alt="Nowify" />
        <span class="cfg-header-product">Configurator</span>
      </div>
      <nav class="cfg-header-nav" aria-label="Configurator actions">
        <div id="cfg-nav-tools" class="cfg-nav-tools" aria-label="Configuration tools"></div>
        <div class="cfg-nav-actions">
          <button type="button" id="btn-obs-guide" class="cfg-nav-btn cfg-nav-btn--ghost">
            <i class="fa-solid fa-display" aria-hidden="true"></i>
            <span>Add to OBS</span>
          </button>
          <button type="button" id="btn-open" class="cfg-nav-btn cfg-nav-btn--ghost">
            <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
            <span>Preview</span>
          </button>
          <button type="button" id="btn-copy" class="cfg-nav-btn cfg-nav-btn--primary">
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
            <span>Copy URL</span>
          </button>
          <div class="cfg-nav-overflow">
            <button
              type="button"
              id="btn-nav-more"
              class="cfg-nav-btn cfg-nav-btn--icon"
              aria-label="More actions"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="cfg-nav-overflow-menu"
            >
              <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
            </button>
            <div id="cfg-nav-overflow-menu" class="cfg-nav-overflow-menu" role="menu" hidden>
              <a href="stats.html" class="cfg-nav-overflow-item" role="menuitem">
                <i class="fa-solid fa-chart-simple" aria-hidden="true"></i>
                <span>Stats</span>
              </a>
              <button type="button" id="btn-reset" class="cfg-nav-overflow-item" role="menuitem">
                <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
                <span>Reset settings</span>
              </button>
              <button type="button" id="btn-clear-cache" class="cfg-nav-overflow-item cfg-nav-overflow-item--danger" role="menuitem">
                <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                <span>Clear cache</span>
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <div id="cfg-body">
      <aside id="cfg-sidebar"></aside>

      <main id="cfg-preview">
        <div id="cfg-preview-primary" class="cfg-preview-primary">
          <div class="cfg-preview-panel-head">
            <span class="cfg-preview-panel-label">Card design · zoomed</span>
          </div>
          <div id="cfg-preview-frame-wrap">
            <iframe id="cfg-iframe" src="./overlay.html" frameborder="0" title="Overlay preview"></iframe>
          </div>
        </div>
        <section id="cfg-obs-minimap" class="cfg-obs-minimap" aria-label="OBS canvas placement">
          <div class="cfg-obs-minimap-head">
            <div class="cfg-obs-minimap-head-top">
              <span class="cfg-obs-minimap-title">Canvas placement</span>
              <span id="cfg-obs-size-label" class="cfg-obs-size-label"></span>
            </div>
            <div id="cfg-obs-canvas-toolbar" class="cfg-obs-canvas-toolbar">
              <div class="cfg-obs-canvas-presets">
                <button type="button" class="cfg-btn cfg-sm-btn cfg-active" data-canvas-preset="1080p">1920×1080</button>
                <button type="button" class="cfg-btn cfg-sm-btn" data-canvas-preset="720p">1280×720</button>
                <button type="button" class="cfg-btn cfg-sm-btn" data-canvas-preset="custom">Custom</button>
              </div>
              <div id="cfg-obs-canvas-custom" class="cfg-obs-canvas-custom" hidden>
                <input id="cfg-obs-canvas-w" class="cfg-input cfg-obs-canvas-input" type="number" min="320" max="7680" value="1920" aria-label="Canvas width" />
                <span class="cfg-obs-canvas-times">×</span>
                <input id="cfg-obs-canvas-h" class="cfg-input cfg-obs-canvas-input" type="number" min="180" max="4320" value="1080" aria-label="Canvas height" />
              </div>
            </div>
          </div>
          <div class="cfg-obs-placement-body">
            <div id="cfg-obs-minimap-scaler" class="cfg-obs-minimap-scaler">
              <div id="cfg-obs-canvas" class="cfg-obs-canvas">
                <div id="cfg-obs-overlay-block" class="cfg-obs-overlay-block" tabindex="0" role="img" aria-label="Overlay footprint on stream canvas"></div>
              </div>
            </div>
            <div class="cfg-obs-placement-controls">
              <p class="cfg-placement-controls-label">Position on stream</p>
              <div class="cfg-placement-controls-inner">
                <div class="cfg-anchor-grid" role="group" aria-label="Overlay anchor on stream canvas"></div>
                <div id="cfg-position-offsets" class="cfg-position-offsets" hidden>
                  <label class="cfg-position-offset-field">
                    <span class="cfg-position-offset-label">X offset</span>
                    <input type="number" id="ctrl-positionOffsetX" class="cfg-input-inline cfg-value-mono cfg-position-offset-input" min="0" max="2000" value="40" aria-label="Horizontal offset in pixels" />
                  </label>
                  <label class="cfg-position-offset-field">
                    <span class="cfg-position-offset-label">Y offset</span>
                    <input type="number" id="ctrl-positionOffsetY" class="cfg-input-inline cfg-value-mono cfg-position-offset-input" min="0" max="2000" value="40" aria-label="Vertical offset in pixels" />
                  </label>
                </div>
              </div>
            </div>
          </div>
        </section>
        <div id="cfg-preview-bar">
          <div class="cfg-preview-url-wrap">
            <span id="cfg-url-display" class="cfg-preview-url-text"></span>
          </div>
          <button type="button" id="btn-copy-bar" class="cfg-preview-copy-btn" aria-label="Copy URL" title="Copy URL">
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
          </button>
        </div>
      </main>
    </div>
  </div>
  <a
    class="nowify-attribution"
    href="https://github.com/KelvinPH/Nowify"
    target="_blank"
    rel="noopener noreferrer"
  >
    Built by KelvinPH • github.com/KelvinPH/Nowify
  </a>

  <script type="module">
    import "./src/attribution.js";
    import { initConfig } from "./src/config/controls.js";
    initConfig();
  </script>
</body>
</html>
